<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data:; style-src 'unsafe-inline'; script-src 'none'; object-src 'none'; base-uri 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeedBank Insights</title>
    <style>
      :root {
        color-scheme: light;
        --forest: #213921;
        --psu-green: #6d8d24;
        --electric: #cfd82d;
        --paper: #f7f8f2;
        --ink: #0f180e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        background: var(--forest);
        color: var(--paper);
        display: flex;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        height: 100vh;
        justify-content: center;
        margin: 0;
        overflow: hidden;
      }

      main {
        align-items: center;
        display: grid;
        gap: 18px;
        justify-items: center;
        padding: 34px 42px 30px;
        text-align: center;
        width: 100%;
      }

      .mark {
        align-items: center;
        background: #f7f8f2;
        border: 1px solid rgba(207, 216, 45, 0.7);
        border-radius: 8px;
        box-shadow: 0 18px 38px rgba(0, 0, 0, 0.26);
        display: flex;
        height: 84px;
        justify-content: center;
        width: 84px;
      }

      .mark img {
        display: block;
        height: 66px;
        width: 66px;
      }

      h1 {
        color: #ffffff;
        font-size: 25px;
        font-weight: 760;
        letter-spacing: 0;
        line-height: 1.1;
        margin: 0;
      }

      p {
        color: rgba(247, 248, 242, 0.84);
        font-size: 13px;
        font-weight: 560;
        letter-spacing: 0;
        line-height: 1.5;
        margin: 0;
      }

      .status {
        display: grid;
        gap: 9px;
        width: min(280px, 76vw);
      }

      .bar {
        background: rgba(255, 255, 255, 0.16);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        height: 8px;
        overflow: hidden;
        width: 100%;
      }

      .bar span {
        animation: load 1.25s ease-in-out infinite;
        background: var(--electric);
        border-radius: inherit;
        display: block;
        height: 100%;
        width: 42%;
      }

      @keyframes load {
        0% {
          margin-left: -45%;
        }

        100% {
          margin-left: 105%;
        }
      }
    </style>
  </head>
  <body>
    <main aria-label="SeedBank Insights splash">
      <div class="mark" aria-hidden="true">
        <img src="./app-icon.svg" alt="" />
      </div>
      <div>
        <h1>SeedBank Insights</h1>
        <p>Preparing propagation evidence</p>
      </div>
      <div class="status" aria-hidden="true">
        <div class="bar"><span></span></div>
      </div>
    </main>
  </body>
</html>
