version: 2
updates:
  - package-ecosystem: npm
    directory: /
    # Let Dependabot do its job, but keep branch noise low:
    # one grouped production PR and one grouped development PR per cycle.
    schedule:
      interval: monthly
      time: "09:00"
      timezone: America/Los_Angeles
    cooldown:
      default-days: 3
    open-pull-requests-limit: 2
    allow:
      - dependency-name: "*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    ignore:
      # Major dependency jumps are not routine maintenance. Let humans plan
      # those on a normal feature branch with targeted compatibility testing.
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      security-dependencies:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    # Actions updates are grouped so runtime/tooling changes stay auditable.
    schedule:
      interval: monthly
      time: "09:30"
      timezone: America/Los_Angeles
    cooldown:
      default-days: 3
    open-pull-requests-limit: 1
    allow:
      - dependency-name: "*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    ignore:
      # Major Action upgrades can change runner/runtime behavior. Keep them
      # deliberate; routine Dependabot branches are for minor/patch updates.
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
